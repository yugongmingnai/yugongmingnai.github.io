<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>作品展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* 纵向排列 */
            align-items: center;    /* 水平居中 */
            padding: 20px 0;        /* 上下留边距 */
            gap: 20px;              /* 图片之间的空隙 */
        }
        .full-img {
            max-width: 90vw;       /* 图片最大宽度为屏幕 90% */
            max-height: 80vh;      /* 图片最大高度为屏幕 80% */
            object-fit: contain;   /* 保持图片比例，不拉伸 */
            border-radius: 8px;    /* 可选：给图片加圆角 */
        }
    </style>
</head>
<body>
    <img src="1.png" class="full-img" alt="展示图1">
    <img src="2.png" class="full-img" alt="展示图2">
    <img src="3.png" class="full-img" alt="展示图3">
    <img src="4.png" class="full-img" alt="展示图3">
</body>
</html>
