<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>图片展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .full-img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <!-- 这里可以改成 2.png 或 3.png 来展示其他图片 -->
    <img src="1.png" class="full-img" alt="展示图">
</body>
</html>
